<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Image Carousels</title>
  </head>
  <body>
    <h1>Image Carousels</h1>

  <div id="slider-container">
    <button class="prev" onclick="moveSlide(-1)">
      <i class="bi bi-arrow-left-circle-fill"></i>
    </button>
    <div id="slider-images">
      <img class="nature-image" src="images/nature/1.png" alt="" />
      <img class="nature-image" src="images/nature/2.png" alt="" />
      <img class="nature-image" src="images/nature/3.png" alt="" />
      <img class="nature-image" src="images/nature/4.png" alt="" />
    </div>
    <button class="next" onclick="moveSlide(1)">
      <i class="bi bi-arrow-right-circle-fill"></i>
    </button>
  </div>

    <script src="script.js"></script>
  </body>
</html>
