<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Image Carousels</title>
  </head>
  <body>
    <h1>Image Carousels</h1>

    <div class="carousel-container">
      <button class="prev" onclick="moveNatureCarousel(-1)">
        <i class="bi bi-arrow-left-circle-fill"></i>
      </button>
      <div class="carousel-images">
        <img class="image nature" src="images/nature/1.png" alt="" />
        <img class="image nature" src="images/nature/2.png" alt="" />
        <img class="image nature" src="images/nature/3.png" alt="" />
        <img class="image nature" src="images/nature/4.png" alt="" />
        <img class="image nature" src="images/nature/5.png" alt="" />
        <img class="image nature" src="images/nature/6.png" alt="" />
        <img class="image nature" src="images/nature/7.png" alt="" />
        <img class="image nature" src="images/nature/8.png" alt="" />
        <img class="image nature" src="images/nature/9.png" alt="" />
        <img class="image nature" src="images/nature/10.png" alt="" />
      </div>
      <button class="next" onclick="moveNatureCarousel(1)">
        <i class="bi bi-arrow-right-circle-fill"></i>
      </button>
    </div>

    <div class="carousel-container">
      <button class="prev" onclick="movelandCarousel(-1)">
        <i class="bi bi-arrow-left-circle-fill"></i>
      </button>
      <div class="carousel-images">
        <img class="image land" src="images/land/1.png" alt="" />
        <img class="image land" src="images/land/2.png" alt="" />
        <img class="image land" src="images/land/3.png" alt="" />
        <img class="image land" src="images/land/4.png" alt="" />
        <img class="image land" src="images/land/5.png" alt="" />
        <img class="image land" src="images/land/6.png" alt="" />
        <img class="image land" src="images/land/7.png" alt="" />
        <img class="image land" src="images/land/8.png" alt="" />
        <img class="image land" src="images/land/9.png" alt="" />
        <img class="image land" src="images/land/10.png" alt="" />
      </div>
      <button class="next" onclick="movelandCarousel(1)">
        <i class="bi bi-arrow-right-circle-fill"></i>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
