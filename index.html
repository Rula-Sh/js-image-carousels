<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Image Carousels</title>
  </head>
  <body>
    <h1>Image Carousels</h1>

    <div class="carousel-container">
      <button class="prev" onclick="moveNatureCarousel(-1)">
        <i class="bi bi-arrow-left-circle-fill"></i>
      </button>
      <div class="carousel-images">
        <img class="carousel-image nature-image" src="images/nature/1.png" alt="" />
        <img class="carousel-image nature-image" src="images/nature/2.png" alt="" />
        <img class="carousel-image nature-image" src="images/nature/3.png" alt="" />
        <img class="carousel-image nature-image" src="images/nature/4.png" alt="" />
      </div>
      <button class="next" onclick="moveNatureCarousel(1)">
        <i class="bi bi-arrow-right-circle-fill"></i>
      </button>
    </div>

    <div class="carousel-container">
      <button class="prev" onclick="moveAnimalsCarousel(-1)">
        <i class="bi bi-arrow-left-circle-fill"></i>
      </button>
      <div class="carousel-images">
        <img class="carousel-image animal-image" src="images/animals/1.png" alt="" />
        <img class="carousel-image animal-image" src="images/animals/2.png" alt="" />
        <img class="carousel-image animal-image" src="images/animals/3.png" alt="" />
        <img class="carousel-image animal-image" src="images/animals/4.png" alt="" />
      </div>
      <button class="next" onclick="moveAnimalsCarousel(1)">
        <i class="bi bi-arrow-right-circle-fill"></i>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
